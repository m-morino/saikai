name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: ${{ matrix.os }} · py${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ['3.11', '3.12', '3.13']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      # Deps mirror pyproject (textual / pyte / platformdirs). The PTY backends
      # (pywinpty / ptyprocess) are intentionally NOT installed: saikai_terminal
      # soft-imports them, so the suites — including the textual run_test smoke —
      # run headless without a real PTY.
      - name: Install dependencies
        run: python -m pip install --upgrade pip textual pyte platformdirs

      - name: Compile + run test suites
        shell: bash
        run: |
          set -euo pipefail
          python -m py_compile saikai.py saikai_terminal.py
          for t in test_config test_sort_recency test_split_divider test_resource_bounds test_terminal_concurrency test_terminal_watchdog; do
            echo "== $t =="
            python "tests/$t.py"
          done
