name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: ${{ matrix.os }} · py${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ['3.11', '3.12', '3.13']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      # Install the built package contract, including the platform PTY backend.
      - name: Install dependencies
        run: python -m pip install --upgrade pip .

      - name: Compile + run test suites
        shell: bash
        run: |
          set -euo pipefail
          python -m py_compile saikai.py saikai_terminal.py saikai_provider.py
          for t in test_config test_providers test_sort_recency test_split_divider test_resource_bounds test_terminal_concurrency test_terminal_watchdog test_keyboard_leader test_pty_backend; do
            echo "== $t =="
            python "tests/$t.py"
          done
