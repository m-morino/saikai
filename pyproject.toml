[project]
name = "recap"
version = "0.1.0"
description = "Claude Code session history viewer with LLM summarization"
requires-python = ">=3.10"
authors = [{ name = "masayuki.morino" }]
dependencies = []

[project.scripts]
recap = "recap:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
only-include = ["recap.py"]

[tool.hatch.build.targets.sdist]
include = ["recap.py", "pyproject.toml", ".gitignore"]
