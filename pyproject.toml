[project]
name = "recap"
version = "0.1.0"
description = "A terminal session browser for Claude Code — browse, search, group, and resume past sessions, with a built-in split-live pane (on by default)."
readme = "README.md"
requires-python = ">=3.11"
license = { file = "LICENSE" }
# TODO(publish): set your own name / GitHub handle before publishing.
authors = [{ name = "recap contributors" }]
keywords = ["claude", "claude-code", "tui", "textual", "sessions", "cli"]
classifiers = [
    "License :: OSI Approved :: MIT License",
    "Environment :: Console",
    # Supported environments are LIMITED to what the code actually implements +
    # can be CI-tested — deliberately NOT "OS Independent" (recap has Windows
    # ConPTY, POSIX PTY, and per-OS RAM probes). WSL counts as Linux.
    "Operating System :: Microsoft :: Windows",
    "Operating System :: POSIX :: Linux",
    "Operating System :: MacOS",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Utilities",
]
dependencies = [
    "textual>=0.50",
    "pyte>=0.8",
    "pywinpty>=2.0 ; sys_platform == 'win32'",
    "ptyprocess>=0.7 ; sys_platform != 'win32'",
]

[project.scripts]
recap = "recap:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
# recap.py imports recap_terminal — BOTH must ship or the wheel is broken.
only-include = ["recap.py", "recap_terminal.py"]

[tool.hatch.build.targets.sdist]
include = [
    "recap.py",
    "recap_terminal.py",
    "pyproject.toml",
    "README.md",
    "LICENSE",
    "THIRD-PARTY-NOTICES.md",
    ".gitignore",
]
